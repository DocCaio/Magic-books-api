version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booksdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/booksdb
      DB_USERNAME: postgres
      DB_PASSWORD: post
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: false
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: