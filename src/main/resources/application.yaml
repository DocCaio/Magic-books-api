version: '3.8'

services:
  postgres-db:
    image: postgres:latest
    container_name: magic-books-db
    environment:
      POSTGRES_DB: booksdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post
    ports:
      - "5432:5432"

  api-service:
    image: magic-books-api-api:latest
    container_name: jovial_mayer
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/booksdb
      - DB_USERNAME=postgres
      - DB_PASSWORD=post
    depends_on:
      - postgres-db